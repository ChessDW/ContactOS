<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nuevo Contacto — ContactOS</title>

    <!-- CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="app-layout">
      <!-- ═══════════════════════════════════════
           SIDEBAR
      ═══════════════════════════════════════ -->

      <aside class="sidebar">
        <!-- Brand -->
        <div class="sidebar-brand">
          <div class="brand-dot"></div>

          <span class="brand-name">ContactOS</span>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
          <a href="{{ url_for('dashboard') }}" class="nav-item">
            <span class="nav-icon">
              <svg
                width="17"
                height="17"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />

                <circle cx="9" cy="7" r="4" />
              </svg>
            </span>

            <span class="nav-label">Dashboard</span>
          </a>

          <a href="{{ url_for('nuevo_contacto') }}" class="nav-item active">
            <span class="nav-icon">
              <svg
                width="17"
                height="17"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="12" y1="5" x2="12" y2="19"></line>

                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </span>

            <span class="nav-label">Nuevo contacto</span>
          </a>
        </nav>

        <!-- Footer -->
        <div class="sidebar-footer">
          <a href="{{ url_for('login') }}" class="nav-item danger">
            <span class="nav-label">Cerrar sesión</span>
          </a>
        </div>
      </aside>

      <!-- ═══════════════════════════════════════
           MAIN CONTENT
      ═══════════════════════════════════════ -->

      <main class="main-content">
        <!-- Header -->
        <header class="content-header">
          <h1 class="content-title">Agregar contacto</h1>
        </header>

        <!-- Form -->
        <section class="dashboard-main">
          <div class="modal-box" style="max-width: 900px; margin: 0 auto">
            <h2 class="modal-title">Información del contacto</h2>

            <form action="{{ url_for('agregar_contacto') }}" method="POST">
              <div class="form-grid">
                <!-- Nombre -->
                <div class="field-group">
                  <label for="nombre">
                    Nombre
                    <span class="required">*</span>
                  </label>

                  <input type="text" id="nombre" name="nombre" required />
                </div>

                <!-- Apellido -->
                <div class="field-group">
                  <label for="apellido">
                    Apellido
                    <span class="required">*</span>
                  </label>

                  <input type="text" id="apellido" name="apellido" required />
                </div>

                <!-- Teléfono -->
                <div class="field-group">
                  <label for="telefono">
                    Teléfono
                    <span class="required">*</span>
                  </label>

                  <input
                    type="tel"
                    id="telefono"
                    name="telefono"
                    placeholder="88888888"
                    required
                  />
                </div>

                <!-- Correo -->
                <div class="field-group">
                  <label for="correo">
                    Correo
                    <span class="required">*</span>
                  </label>

                  <input type="email" id="correo" name="correo" required />
                </div>

                <!-- Descripción -->
                <div class="field-group">
                  <label for="descripcion"> Descripción </label>

                  <input
                    type="text"
                    id="descripcion"
                    name="descripcion"
                    placeholder="Ej. Compañero de trabajo"
                  />
                </div>

                <!-- Categoría -->
                <div class="field-group">
                  <label for="categoria"> Categoría </label>

                  <select id="categoria" name="categoria">
                    <option value="">Seleccione</option>

                    <option value="Familia">Familia</option>

                    <option value="Trabajo">Trabajo</option>

                    <option value="Amigos">Amigos</option>

                    <option value="Otro">Otro</option>
                  </select>
                </div>
              </div>

              <!-- Dirección -->
              <div class="field-group">
                <label for="direccion"> Dirección </label>

                <input
                  type="text"
                  id="direccion"
                  name="direccion"
                  placeholder="Ej. Heredia, Costa Rica"
                />
              </div>

              <!-- Favorito -->
              <div class="field-group checkbox-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="favorito" name="favorito" />

                  <span class="checkbox-custom"></span>

                  Marcar como favorito ⭐
                </label>
              </div>

              <!-- Buttons -->
              <div class="modal-actions">
                <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">
                  Cancelar
                </a>

                <button type="submit" class="btn btn-primary">
                  Guardar contacto
                </button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
